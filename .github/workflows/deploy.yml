name: Deploy to GitHub Pages

on:
  # main への push で自動デプロイ
  push:
    branches: [main]
  # 手動実行も可能にする
  workflow_dispatch:

# GitHub Pages へのデプロイに必要な権限
permissions:
  contents: read
  pages: write
  id-token: write

# 同時実行は1つに制限（進行中のデプロイは完了させる）
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Astro を pnpm でビルドし、Pages 用アーティファクトを生成・アップロードする。
      # withastro/action は pnpm-lock.yaml と package.json の packageManager から
      # pnpm を自動検出する。
      - name: Build with Astro
        uses: withastro/action@v3

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
